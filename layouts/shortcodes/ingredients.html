<div class="ingredients-list">
    {{ $content := .Inner | markdownify }}
    {{ $lines := split $content "\n" }}
    {{ range $lines }}
        {{ if findRE `^\d+` . }}
            <div class="ingredient-line">{{ . }}</div>
        {{ else }}
            {{ . | safeHTML }}
        {{ end }}
    {{ end }}
</div>
