{{ define "main" }}
    <header>
        <h2>{{ .Title }}</h2>
        {{ with .Description }}
            <p>{{ . }}</p>
        {{ end }}
    </header>

    {{ if .Pages }}
        <section>
            <div class="picture-grid">
                {{ range .Pages }}
                    {{ partial "recipe-card.html" (dict "recipe" .) }}
                {{ end }}
            </div>
        </section>
    {{ else }}
        <section>
            <p>Valitettavasti sisältöä ei ole saatavilla tällä hetkellä.</p>
        </section>
    {{ end }}
{{ end }}
