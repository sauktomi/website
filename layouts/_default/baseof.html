<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Summary }}{{ . }}{{ else }}{{ .Site.Params.description }}{{end}}{{end}}">
    <link rel="stylesheet" href="{{ "css/styles.css" | relURL }}">
    <link rel="stylesheet" href="{{ "css/print.css" | relURL }}" media="print">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ "favicon/apple-touch-icon.png" | relURL }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ "favicon/favicon-32x32.png" | relURL }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ "favicon/favicon-16x16.png" | relURL }}">
    <link rel="manifest" href="{{ "favicon/site.webmanifest" | relURL }}">
    <script src="{{ "js/main.js" | relURL }}" defer></script>
    <script src="{{ "js/category-nav.js" | relURL }}"></script>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            {{ partial "header.html" . }}
            {{ partial "nav.html" . }}
            {{ block "sidebar" . }}{{ end }}
        </aside>
        <main class="content">
            {{ block "main" . }}{{ end }}

            {{ if and (not .IsHome) (not .IsSection) (not .IsNode) }}
                {{ partial "action-buttons.html" . }}
            {{ end }}
        </main>
        {{ partial "category-nav.html" . }}
    </div>
</body>
</html>
