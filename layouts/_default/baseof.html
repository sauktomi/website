<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    {{ partial "head.html" . }}
</head>
<body>
    <a href="#main-content" class="skip-link">Siirry sisältöön</a>
    {{ partial "top-nav.html" . }}
    <div class="container">
        <aside class="sidebar">
            <header><h1><a href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a></h1></header>            
            {{ partial "nav.html" . }}
            {{ block "sidebar" . }}{{ end }}
            {{ if and (not .IsHome) (not .IsSection) (not .IsNode) }}
                {{ partial "recipe-info-bar.html" . }}
            {{ end }}
        </aside>
        <main class="content" id="main-content">
            {{ block "main" . }}{{ end }}
        </main>
    </div>
</body>
</html>
