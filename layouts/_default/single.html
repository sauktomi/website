{{ define "sidebar" }}
    {{ partial "recipe-ingredients.html" . }}
    <script src="/js/recipe-scaling.js"></script>
{{ end }}

{{ define "main" }}
<article class="recipe">
    <header class="recipe-header">
        <h1 class="recipe-title">{{ .Title }}</h1>
        
        {{ partial "recipe-header-image.html" . }}

        {{ with .Params.description }}
            <div class="recipe-description">
                <p>{{ . }}</p>
            </div>
        {{ end }}

        {{ partial "recipe-info.html" . }}
    </header>

    {{ partial "recipe-content.html" . }}
</article>
{{ end }}
