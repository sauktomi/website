{{ define "main" }}
    <article>
        <header>
            {{ partial "recipe-header-image.html" . }}
            <h1>{{ .Title }}</h1>
        </header>
        
        {{ with .Params.description }}
            <section class="content-description">
                <p class="text-secondary">{{ . }}</p>
            </section>
        {{ end }}

        <section>
            {{ .Content }}
        </section>
    </article>
{{ end }}
