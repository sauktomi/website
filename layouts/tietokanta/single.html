{{ define "main" }}
    <article>
        <header>
            {{ partial "recipe-header-image.html" . }}
            <h1>{{ .Title }}</h1>
        </header>
        <section class="prose-content">
        {{ with .Params.description }}
            <section class="content-description">
                <p>{{ . }}</p>
            </section>
        {{ end }}

        {{ .Content }}
    </section>
</article>
{{ end }}
