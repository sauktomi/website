{{ $currentPage := . }}

<nav class="main-nav">
    <ul class="nav-list">
        {{ $currentSection := .Section }}
        {{ range .Site.Menus.main }}
            {{ $isCurrentSection := eq $currentSection (trim .URL "/") }}
            <li class="nav-item{{ if $isCurrentSection }} active{{ end }}">
                <a href="{{ .URL }}" class="nav-link">
                    {{ .Name }}
                </a>
            </li>
        {{ end }}
    </ul>
</nav>
