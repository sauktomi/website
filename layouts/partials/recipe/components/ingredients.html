{{ $content := . }}

<section class="recipe-ingredients">
    <h2>Ainesosat</h2>

    {{ with .Params.skaalaus }}
    <div class="scaling-control">
        <select id="recipe-scale" onchange="scaleRecipe(this.value)" aria-label="Reseptin skaalaus">
            <option value="1">1x (Alkuperäinen)</option>
            {{ range . }}
                <option value="{{ index (split . "x") 0 }}">{{ . }}</option>
            {{ end }}
        </select>
    </div>
    {{ end }}

    {{ $shortcode := "(?s){{< ingredients >}}(.*?){{</ ingredients >}}" }}
    {{ $matches := findRE $shortcode .RawContent }}
    
    {{ if $matches }}
        <div class="ingredients-content">
            {{ index $matches 0 | markdownify }}
        </div>
    {{ else }}
        <p class="ingredients-empty">Ainesosia ei löytynyt.</p>
    {{ end }}
</section>
