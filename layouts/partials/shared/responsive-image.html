{{ $image := .image }}
{{ $alt := .alt }}
{{ $class := .class | default "" }}

<picture class="responsive-image {{ $class }}">
    {{ if $image }}
        <img 
            src="{{ $image }}"
            alt="{{ $alt }}"
            loading="lazy"
            {{ with .width }}width="{{ . }}"{{ end }}
            {{ with .height }}height="{{ . }}"{{ end }}
        >
    {{ end }}
</picture>
