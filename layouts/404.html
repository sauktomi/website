{{ define "main" }}
<div class="error-page">
    <h1>404 - Sivua ei löytynyt</h1>

    <div class="error-message">
        <p>Valitettavasti etsimääsi sivua ei löytynyt. Tämä voi johtua seuraavista syistä:</p>
        <ul>
            <li>Sivu on poistettu tai siirretty</li>
            <li>URL-osoite on kirjoitettu väärin</li>
            <li>Linkki, jota seurasit, on vanhentunut</li>
        </ul>
    </div>

    <div class="action-box">
        <ul>
            <li>
                <a href="/">
                    Palaa etusivulle
                </a>
            </li>
        </ul>
    </div>
</div>
{{ end }}
