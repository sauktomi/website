baseURL: "https://tompsa.com/"
languageCode: "fi-FI"
defaultContentLanguage: "fi"
title: "Tomin ruokanurkka"

contentDir: "content"

permalinks:
  reseptit: "/:section/:slug/"
  kategoriat: "/reseptit/:slug/"

taxonomies:
  difficulty: difficulties
  appliance: appliances
  method: methods
  diet: diets
  kategoria: "kategoriat"
  tagi: "tagit"

menu:
  main:
    - identifier: "reseptit"
      name: "Reseptit"
      url: "/reseptit/"
      weight: 1
    - identifier: "tagit"
      name: "Tagit"
      url: "/tagit/"
      weight: 2

outputs:
  home: ["HTML", "RSS"]
  page: ["HTML", "PDF", "Print", "SearchIndex"]
  section: ["HTML", "RSS", "SearchIndex"]
  taxonomy: ["HTML", "RSS"]
  term: ["HTML", "RSS"]
  search: ["HTML", "SearchIndex"]

outputFormats:
  Print:
    mediaType: "text/html"
    baseName: "print"
    isHTML: true
    permalinkable: true
  SearchIndex:
    mediaType: application/json
    baseName: search-index-slim
    isPlainText: true
    notAlternative: true

mediaTypes:
  application/json:
    suffixes: ['json']    

params:
  description: "Oman maun reseptejä"
  author: "Tomi Saukkonen"
  logo: "/images/logo.png"
  dateFormat: "2. January 2006"

privacy:
  disqus:
    disable: true
  googleAnalytics:
    disable: true
  instagram:
    disable: true
  twitter:
    disable: true
  vimeo:
    disable: true
  youtube:
    disable: true

imaging:
  quality: 85
  resampleFilter: "Lanczos"
  anchor: "Smart"
  bgColor: "#ffffff"
  resizeOptions:
    - "600x400"
    - "800x600"
    - "1200x800"
  formats:
    - "webp"
    - "jpg"

minify:
  minifyOutput: true
  tdewolff:
    html:
      keepWhitespace: false
    css:
      keepCSS2: false
    js:
      keepVarNames: false
    json:
      keepNumbers: false
    svg:
      keepComments: false
    xml:
      keepWhitespace: false

enableEmoji: true
